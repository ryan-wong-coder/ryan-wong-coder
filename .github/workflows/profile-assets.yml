name: Refresh profile telemetry

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Generate profile data and timeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python3 scripts/generate_profile_assets.py

      - name: Generate contribution animations
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/contribution-snake.svg?palette=github-light&color_snake=#7c3aed
            assets/contribution-snake-dark.svg?palette=github-dark&color_snake=#38bdf8

      - name: Publish refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets RECENT_ACTIVITY.md
          if git diff --cached --quiet; then
            echo "Profile assets are already current."
            exit 0
          fi
          git commit -m "Refresh profile telemetry"
          git push
